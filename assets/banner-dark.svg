<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#7c3aed" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="lineGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0"/>
      <stop offset="20%" stop-color="#10b981"/>
      <stop offset="80%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <style>
    @keyframes pulse {
      0%, 100% { opacity: 0.4; transform: scale(1); }
      50% { opacity: 0.7; transform: scale(1.05); }
    }
    .glow-bg {
      animation: pulse 4s ease-in-out infinite;
      transform-origin: center;
    }
    .title {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 56px;
      font-weight: 800;
      letter-spacing: -1px;
      fill: #f1f5f9;
    }
    .subtitle {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 18px;
      font-weight: 400;
      fill: #94a3b8;
      letter-spacing: 0.5px;
    }
  </style>

  <!-- Background -->
  <rect width="800" height="200" fill="#0f172a" rx="12"/>

  <!-- Animated glow -->
  <ellipse class="glow-bg" cx="400" cy="90" rx="300" ry="80" fill="url(#glow)"/>

  <!-- Accent line -->
  <rect x="200" y="135" width="400" height="2" fill="url(#lineGradient)" rx="1"/>

  <!-- Title -->
  <text class="title" x="400" y="105" text-anchor="middle">KRYPTONITE</text>

  <!-- Subtitle -->
  <text class="subtitle" x="400" y="170" text-anchor="middle">Spec-Driven Development for Claude Code</text>
</svg>
