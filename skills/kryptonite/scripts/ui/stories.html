<!DOCTYPE html>
<html data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kryptonite — Stories</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.min.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
  <script src="/ui/assets/app.js"></script>
  <link rel="stylesheet" href="/ui/assets/style.css">
</head>
<body x-data="storiesPage()" x-init="init()">
  <div id="nav-container"></div>

  <!-- Filter Bar -->
  <div class="max-w-full mx-auto px-4 pt-4" style="margin-top: 56px;">
    <div class="flex flex-wrap items-center gap-2 mb-4">
      <!-- Repo Filter -->
      <select class="select select-xs bg-slate-900 border-slate-700" x-model="filters.repo">
        <option value="">All Repos</option>
        <template x-for="repo in ($store.app.repos || [])" :key="repo.name">
          <option :value="repo.name" x-text="repo.name"></option>
        </template>
      </select>

      <!-- Persona Filter -->
      <select class="select select-xs bg-slate-900 border-slate-700" x-model="filters.party">
        <option value="">All Personas</option>
        <template x-for="party in ($store.app.epic?.parties || [])" :key="party.name">
          <option :value="party.name" x-text="party.name"></option>
        </template>
      </select>

      <!-- Priority Filter -->
      <select class="select select-xs bg-slate-900 border-slate-700" x-model="filters.priority">
        <option value="">All Priorities</option>
        <option value="critical">Critical</option>
        <option value="high">High</option>
        <option value="medium">Medium</option>
        <option value="low">Low</option>
      </select>

      <!-- Wave Filter -->
      <select class="select select-xs bg-slate-900 border-slate-700" x-model="filters.wave">
        <option value="">All Waves</option>
        <template x-for="wave in ($store.app.state?.waves || [])" :key="wave.id">
          <option :value="wave.id" x-text="wave.name"></option>
        </template>
      </select>

      <!-- Has Mock Checkbox -->
      <label class="flex items-center gap-1.5 text-xs text-slate-300 cursor-pointer">
        <input type="checkbox" class="checkbox checkbox-xs checkbox-success" x-model="filters.hasMock">
        Has Mock
      </label>

      <!-- Search Input -->
      <input type="text" class="input input-xs bg-slate-900 border-slate-700 w-40" placeholder="Search stories..." x-model="filters.search">
    </div>
  </div>

  <!-- Kanban Board -->
  <div class="max-w-full mx-auto px-4 pb-4">
    <div class="grid grid-cols-5 gap-2" style="min-height: calc(100vh - 140px);">
      <template x-for="col in columns" :key="col.key">
        <div class="rounded-lg p-2 border" :class="col.bgClass">
          <!-- Column Header -->
          <div class="flex items-center gap-2 mb-3 px-1">
            <span class="w-2.5 h-2.5 rounded-full flex-shrink-0" :style="'background:' + col.color"></span>
            <span class="text-xs font-semibold text-slate-200" x-text="col.label"></span>
            <span class="badge badge-xs bg-slate-700 text-slate-300 border-slate-600" x-text="filteredStories(col.statuses).length"></span>
          </div>

          <!-- Story Cards -->
          <div class="space-y-2">
            <template x-for="story in filteredStories(col.statuses)" :key="story.id">
              <div class="story-card cursor-pointer" :style="'border-left: 3px solid ' + col.color" @click="$store.app.openDrawer(story.id)">
                <!-- ID + Repo -->
                <div class="text-[10px] text-slate-500 mb-1">
                  <span x-text="story.id"></span>
                  <span x-show="story.repo" x-text="' · ' + story.repo"></span>
                </div>
                <!-- Title -->
                <div class="text-xs text-slate-100 font-medium mb-2" x-text="story.statement?.i_want || story.id"></div>
                <!-- Badges -->
                <div class="flex flex-wrap gap-1">
                  <span class="badge badge-xs" :class="'badge-' + (story.priority || 'medium')" x-text="story.priority || 'medium'"></span>
                  <span class="badge badge-xs badge-persona" x-show="story.party" x-text="story.party"></span>
                  <span class="badge badge-xs badge-mock" x-show="story.has_mock">🖼</span>
                  <span class="badge badge-xs badge-done font-mono" x-show="story.status === 'done' && story.commit_sha" x-text="(story.commit_sha || '').substring(0, 7)"></span>
                </div>
              </div>
            </template>
          </div>
        </div>
      </template>
    </div>
  </div>

  <!-- Drawer Backdrop -->
  <div class="drawer-backdrop" x-show="$store.app.drawerOpen" @click="$store.app.closeDrawer()" x-transition.opacity :class="{ 'open': $store.app.drawerOpen }"></div>

  <!-- Drawer Panel -->
  <div class="drawer" :class="{ 'open': $store.app.drawerOpen }" @keydown.escape.window="$store.app.closeDrawer()">
    <template x-if="$store.app.drawerStory">
      <div class="flex flex-col gap-4 p-5">

        <!-- Header -->
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-2">
            <span class="badge badge-sm" :class="'badge-' + ($store.app.drawerStory.priority || 'medium')" x-text="$store.app.drawerStory.status || 'pending'"></span>
            <span class="text-xs text-slate-400 font-mono" x-text="$store.app.drawerStory.id"></span>
          </div>
          <button class="btn btn-xs btn-ghost text-slate-400" @click="$store.app.closeDrawer()">✕</button>
        </div>

        <!-- Statement -->
        <div>
          <div class="text-[9px] uppercase text-slate-500 mb-1">Story</div>
          <div class="text-sm text-slate-200" x-text="$store.app.formatStatement($store.app.drawerStory)"></div>
        </div>

        <!-- Meta Grid -->
        <div class="grid grid-cols-2 gap-2">
          <div class="bg-slate-900 p-2 rounded">
            <div class="text-[9px] uppercase text-slate-500">Priority</div>
            <div class="text-xs text-slate-200" x-text="$store.app.drawerStory.priority || 'medium'"></div>
          </div>
          <div class="bg-slate-900 p-2 rounded">
            <div class="text-[9px] uppercase text-slate-500">Repo</div>
            <div class="text-xs text-slate-200" x-text="$store.app.drawerStory.repo || 'N/A'"></div>
          </div>
          <div class="bg-slate-900 p-2 rounded">
            <div class="text-[9px] uppercase text-slate-500">Wave</div>
            <div class="text-xs text-slate-200" x-text="(() => { const waves = $store.app.state?.waves || []; const w = waves.find(w => (w.stories || []).includes($store.app.drawerStory.id)); return w ? w.name : 'Unassigned'; })()"></div>
          </div>
          <div class="bg-slate-900 p-2 rounded">
            <div class="text-[9px] uppercase text-slate-500">Complexity</div>
            <div class="text-xs text-slate-200" x-text="$store.app.drawerStory.complexity || 'N/A'"></div>
          </div>
        </div>

        <!-- Dependencies -->
        <div x-show="($store.app.drawerStory.dependencies || []).length > 0">
          <div class="text-[9px] uppercase text-slate-500 mb-2">Dependencies</div>
          <div class="flex flex-wrap gap-1">
            <template x-for="dep in ($store.app.drawerStory.dependencies || [])" :key="dep">
              <span class="badge badge-xs"
                    :class="($store.app.state?.stories || []).find(s => s.id === dep && s.status === 'done') ? 'badge-done' : 'bg-slate-700 text-slate-300'"
                    x-text="dep + (($store.app.state?.stories || []).find(s => s.id === dep && s.status === 'done') ? ' ✓' : '')"></span>
            </template>
          </div>
        </div>

        <!-- Acceptance Criteria -->
        <div x-show="($store.app.drawerStory.acceptance_criteria || []).length > 0">
          <div class="text-[9px] uppercase text-slate-500 mb-2">Acceptance Criteria</div>
          <div class="space-y-1.5">
            <template x-for="(ac, idx) in ($store.app.drawerStory.acceptance_criteria || [])" :key="idx">
              <div class="text-xs text-slate-300 bg-slate-900 p-2 rounded border-l-2 border-emerald-600" x-text="ac"></div>
            </template>
          </div>
        </div>

        <!-- Definition of Done Checklist -->
        <div x-show="($store.app.drawerStory.definition_of_done || []).length > 0">
          <div class="text-[9px] uppercase text-slate-500 mb-2">Definition of Done</div>
          <div class="space-y-1.5">
            <template x-for="(dod, idx) in ($store.app.drawerStory.definition_of_done || [])" :key="idx">
              <div class="flex items-start gap-2 text-xs text-slate-300">
                <span class="text-slate-500 mt-0.5">○</span>
                <div class="flex-1">
                  <span x-text="dod.description || dod"></span>
                  <span class="text-[9px] bg-slate-700 text-slate-400 px-1.5 py-0.5 rounded ml-2" x-show="dod.validation" x-text="dod.validation"></span>
                </div>
              </div>
            </template>
          </div>
        </div>

        <!-- Mock -->
        <div x-show="$store.app.drawerStory.has_mock">
          <div class="text-[9px] uppercase text-slate-500 mb-2">Mock</div>
          <a :href="'/mocks/' + $store.app.drawerStory.id + '.html'" target="_blank" class="text-xs text-blue-400 hover:text-blue-300 underline">View Mock</a>
        </div>

        <!-- Comments -->
        <div x-data="storyComments()" x-init="loadComments()">
          <div class="text-[9px] uppercase text-slate-500 mb-2">Comments</div>
          <div class="space-y-2 mb-3">
            <template x-for="comment in comments" :key="comment.id">
              <div class="bg-slate-900 p-2 rounded" :class="{ 'opacity-50': comment.resolved }">
                <div class="flex items-center justify-between mb-1">
                  <span class="text-[10px] text-slate-500" x-text="timeAgo(comment.created_at)"></span>
                  <button class="btn btn-xs btn-ghost text-slate-500 text-[10px]" @click="toggleResolve(comment)" x-text="comment.resolved ? 'Unresolve' : 'Resolve'"></button>
                </div>
                <div class="text-xs text-slate-300" :class="{ 'line-through': comment.resolved }" x-text="comment.text"></div>
              </div>
            </template>
          </div>
          <!-- Add Comment -->
          <div class="flex gap-2">
            <input type="text" class="input input-xs flex-1 bg-slate-900 border-slate-700" placeholder="Add a comment..." x-model="newComment" @keydown.meta.enter="addComment()" @keydown.ctrl.enter="addComment()">
            <button class="btn btn-xs btn-success" @click="addComment()">Send</button>
          </div>
        </div>

        <!-- Execution -->
        <div x-show="$store.app.drawerStory.started_at || $store.app.drawerStory.commit_sha">
          <div class="text-[9px] uppercase text-slate-500 mb-2">Execution</div>
          <div class="space-y-1 text-xs text-slate-300">
            <div x-show="$store.app.drawerStory.started_at">
              <span class="text-slate-500">Started:</span>
              <span x-text="$store.app.drawerStory.started_at"></span>
            </div>
            <div x-show="$store.app.drawerStory.agent">
              <span class="text-slate-500">Agent:</span>
              <span x-text="$store.app.drawerStory.agent"></span>
            </div>
            <div x-show="$store.app.drawerStory.commit_sha">
              <span class="text-slate-500">Commit:</span>
              <span class="font-mono" x-text="($store.app.drawerStory.commit_sha || '').substring(0, 7)"></span>
            </div>
          </div>
        </div>

      </div>
    </template>
  </div>

  <script>
    function storiesPage() {
      return {
        filters: { repo: '', party: '', priority: '', wave: '', hasMock: false, search: '' },
        columns: [
          { key: 'pending', label: 'Pending', statuses: ['pending'], color: '#64748b', bgClass: 'col-pending' },
          { key: 'in_progress', label: 'In Progress', statuses: ['in_progress'], color: '#f59e0b', bgClass: 'col-in-progress' },
          { key: 'qa', label: 'QA / Review', statuses: ['qa_validation', 'in_review'], color: '#3b82f6', bgClass: 'col-qa' },
          { key: 'code_review', label: 'Code Review', statuses: ['code_review'], color: '#8b5cf6', bgClass: 'col-code-review' },
          { key: 'done', label: 'Done', statuses: ['done'], color: '#10b981', bgClass: 'col-done' },
        ],
        async init() {
          await this.$store.app.load();
        },
        filteredStories(statuses) {
          let stories = (this.$store.app.state?.stories || []).filter(s => statuses.includes(s.status || 'pending'));
          if (this.filters.repo) stories = stories.filter(s => s.repo === this.filters.repo);
          if (this.filters.party) stories = stories.filter(s => s.party === this.filters.party);
          if (this.filters.priority) stories = stories.filter(s => s.priority === this.filters.priority);
          if (this.filters.wave) {
            const wave = this.$store.app.state?.waves?.find(w => w.id === this.filters.wave);
            if (wave) stories = stories.filter(s => wave.stories.includes(s.id));
          }
          if (this.filters.hasMock) stories = stories.filter(s => s.has_mock);
          if (this.filters.search) {
            const q = this.filters.search.toLowerCase();
            stories = stories.filter(s => s.id.toLowerCase().includes(q) || (s.statement?.i_want || '').toLowerCase().includes(q));
          }
          return stories;
        }
      };
    }

    function storyComments() {
      return {
        comments: [],
        newComment: '',
        async loadComments() {
          this.$watch('$store.app.drawerStory', async (story) => {
            if (story) {
              const res = await fetch('/api/comments?story_id=' + story.id);
              this.comments = await res.json();
            } else {
              this.comments = [];
            }
          });
        },
        async addComment() {
          if (!this.newComment.trim()) return;
          const story = this.$store.app.drawerStory;
          await fetch('/api/comments', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ story_id: story.id, text: this.newComment.trim() })
          });
          this.newComment = '';
          const res = await fetch('/api/comments?story_id=' + story.id);
          this.comments = await res.json();
        },
        async toggleResolve(comment) {
          await fetch('/api/comments/' + comment.id, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ resolved: !comment.resolved })
          });
          comment.resolved = !comment.resolved;
        },
        timeAgo(ts) {
          if (!ts) return '';
          const diff = Date.now() - new Date(ts).getTime();
          const mins = Math.floor(diff / 60000);
          if (mins < 60) return mins + 'm ago';
          const hrs = Math.floor(mins / 60);
          if (hrs < 24) return hrs + 'h ago';
          return Math.floor(hrs / 24) + 'd ago';
        }
      };
    }
  </script>
</body>
</html>
